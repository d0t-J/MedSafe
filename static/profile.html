<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profile — MedSafe</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0a1628;
                --card: #111f38;
                --card2: #162040;
                --border: #1e3a5f;
                --teal: #00c9b1;
                --teal-dark: #00a896;
                --text: #e8f0fe;
                --muted: #7a9cc0;
                --error: #ff6b6b;
                --radius: 14px;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: "DM Sans", sans-serif;
                min-height: 100vh;
                padding: 0 16px 60px;
            }
            nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 20px;
                border-bottom: 1px solid var(--border);
                max-width: 760px;
                margin: 0 auto;
            }
            .nav-logo {
                font-family: "DM Serif Display", serif;
                font-size: 1.3rem;
                background: linear-gradient(135deg, #00c9b1, #7eb8f7);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                text-decoration: none;
            }
            .nav-right {
                display: flex;
                gap: 12px;
                align-items: center;
            }
            .nav-btn {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--muted);
                border-radius: 8px;
                padding: 6px 14px;
                font-size: 0.85rem;
                font-family: "DM Sans", sans-serif;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    color 0.2s;
                text-decoration: none;
            }
            .nav-btn:hover {
                border-color: var(--teal);
                color: var(--teal);
            }
            .container {
                max-width: 760px;
                margin: 0 auto;
                padding-top: 36px;
            }
            .page-title {
                font-family: "DM Serif Display", serif;
                font-size: 1.9rem;
                margin-bottom: 6px;
            }
            .user-email {
                color: var(--muted);
                font-size: 0.9rem;
                margin-bottom: 32px;
            }
            .section-label {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                color: var(--muted);
                margin-bottom: 14px;
            }
            .history-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .history-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 20px 24px;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 16px;
                cursor: pointer;
                transition: border-color 0.2s;
                text-decoration: none;
                color: inherit;
            }
            .history-card:hover {
                border-color: var(--teal);
            }
            .history-drugs {
                font-size: 1rem;
                font-weight: 500;
                color: var(--text);
                margin-bottom: 6px;
            }
            .history-preview {
                font-size: 0.82rem;
                color: var(--muted);
                line-height: 1.5;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .history-time {
                font-size: 0.78rem;
                color: var(--muted);
                white-space: nowrap;
                flex-shrink: 0;
            }
            .empty-state {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 48px 24px;
                text-align: center;
                color: var(--muted);
            }
            .empty-state p {
                margin-bottom: 16px;
            }
            .btn-primary {
                display: inline-block;
                background: linear-gradient(135deg, var(--teal), #00a896);
                color: #0a1628;
                font-family: "DM Sans", sans-serif;
                font-weight: 600;
                font-size: 0.93rem;
                border: none;
                border-radius: 10px;
                padding: 11px 24px;
                cursor: pointer;
                text-decoration: none;
                transition: opacity 0.2s;
            }
            .btn-primary:hover {
                opacity: 0.88;
            }
            .spinner {
                width: 36px;
                height: 36px;
                border: 3px solid var(--border);
                border-top-color: var(--teal);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin: 60px auto;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .error-box {
                background: rgba(255, 107, 107, 0.1);
                border: 1px solid var(--error);
                color: var(--error);
                border-radius: var(--radius);
                padding: 16px 20px;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <nav>
            <a href="/" class="nav-logo">💊 MedSafe</a>
            <div class="nav-right">
                <a href="/" class="nav-btn">← Home</a>
                <button class="nav-btn" id="logoutBtn">Sign out</button>
            </div>
        </nav>

        <div class="container">
            <div id="loadingSpinner"><div class="spinner"></div></div>
            <div id="mainContent" style="display: none">
                <div class="page-title">Search History</div>
                <div class="user-email" id="userEmail"></div>
                <div class="section-label">Past searches</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
            import {
                getAuth,
                onAuthStateChanged,
                signOut,
            } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

            const firebaseConfig = {
                apiKey: "AIzaSyC2pgNxElTmsAvDE1dVzKty4W46rWXQq1M",
                authDomain: "medsafe-2abab.firebaseapp.com",
                projectId: "medsafe-2abab",
                storageBucket: "medsafe-2abab.firebasestorage.app",
                messagingSenderId: "321634603244",
                appId: "1:321634603244:web:3cdb6641e936e2763a95c9",
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            document
                .getElementById("logoutBtn")
                .addEventListener("click", () => {
                    signOut(auth).then(() => {
                        window.location.href = "/";
                    });
                });

            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.href = "/login";
                    return;
                }

                document.getElementById("userEmail").textContent = user.email;

                try {
                    const token = await user.getIdToken();
                    const res = await fetch("/api/history/", {
                        headers: { Authorization: "Bearer " + token },
                    });
                    if (!res.ok) throw new Error("Failed to load history.");
                    const items = await res.json();
                    renderHistory(items);
                } catch (e) {
                    document.getElementById("historyList").innerHTML =
                        `<div class="error-box">${e.message}</div>`;
                }

                document.getElementById("loadingSpinner").style.display =
                    "none";
                document.getElementById("mainContent").style.display = "block";
            });

            function renderHistory(items) {
                const list = document.getElementById("historyList");
                if (!items || items.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <p>No searches saved yet.</p>
                            <a href="/" class="btn-primary">Check a medicine</a>
                        </div>`;
                    return;
                }

                list.innerHTML = items
                    .map((item) => {
                        const drugs = Array.isArray(item.drugs)
                            ? item.drugs.join(", ")
                            : item.drugs;
                        const time = formatTime(item.created_at);
                        const preview = (item.analysis || "")
                            .replace(/\n/g, " ")
                            .trim();
                        return `
                        <div class="history-card" onclick="prefill(${JSON.stringify(drugs)})">
                            <div>
                                <div class="history-drugs">💊 ${escapeHtml(drugs)}</div>
                                <div class="history-preview">${escapeHtml(preview)}</div>
                            </div>
                            <div class="history-time">${time}</div>
                        </div>`;
                    })
                    .join("");
            }

            window.prefill = function (drugs) {
                window.location.href = "/?q=" + encodeURIComponent(drugs);
            };

            function formatTime(ts) {
                if (!ts) return "";
                // Firestore timestamp object or ISO string
                const date = ts._seconds
                    ? new Date(ts._seconds * 1000)
                    : new Date(ts);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);
                if (diffMins < 1) return "Just now";
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays === 1) return "Yesterday";
                return `${diffDays}d ago`;
            }

            function escapeHtml(str) {
                if (!str) return "";
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }
        </script>
    </body>
</html>
